spring.application.name=Everload

# Actuator — only /health exposed, no details (no info leakage)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Rate limiting — auth endpoints (login + register)
app.rate-limit.requests-per-minute=10

# Max simultaneous downloads (yt-dlp processes)
app.downloads.max-concurrent=3
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
logging.file.name=everload.log
logging.level.root=INFO
logging.level.com.EverLoad=INFO

# Trust X-Forwarded-* headers from the reverse proxy (Caddy/Nginx).
# Required so Spring Boot knows the request arrived via HTTPS,
# generates correct redirect URLs, and logs the real client IP.
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

# CORS allowed origins (comma-separated).
# Override via CORS_ALLOWED_ORIGINS environment variable.
# In production set to your actual domain: https://everload.yourdomain.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080,http://localhost,https://localhost,https://127.0.0.1}

# H2 Database (persistent file)
spring.datasource.url=jdbc:h2:file:./everload-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET:EverloadSecretKey2024!SuperSeguro_CambiarEnProduccion_32chars+}
jwt.expiration=86400000

# NAS base storage path (mount Docker volume here)
nas.storage.base=/app/nas_storage

# Avatar storage
avatar.storage.path=./avatars
avatar.max-size-mb=5

# Audio tools — allow large file uploads (up to 500 MB)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ── App version ────────────────────────────────────────────────────────────────
# Update this value on each release. Shown in Panel Admin > Sistema.
app.version=1.0.0

# ── Backup ─────────────────────────────────────────────────────────────────────
# Storage directory for DB backups.
# Docker: override with APP_BACKUP_PATH=/app/data/backups (persisted volume).
app.backup.path=${APP_BACKUP_PATH:./backups}
# Maximum number of backups to keep (oldest are removed automatically).
app.backup.retention=10
# Automatic scheduled backup — disabled by default.
app.backup.auto.enabled=false
# Cron expression for auto-backup. Default: 3 AM every day.
app.backup.auto.cron=0 0 3 * * ?

# ── Update ─────────────────────────────────────────────────────────────────────
# GitHub releases API URL for update checks (leave empty to disable).
# Example: https://api.github.com/repos/youruser/everload/releases/latest
# Tracks latest commit on main — works without creating GitHub releases.
app.update.check-url=https://api.github.com/repos/xianDT01/Everload/commits/main
# Optional path to a shell script that performs the update (leave empty to disable auto-run).
# The script is executed as-is; make sure it is trusted and not user-supplied.
# Example for Docker: /app/scripts/update.sh
app.update.script=
