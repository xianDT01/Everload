spring.application.name=Everload

# Actuator — only /health exposed, no details (no info leakage)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Rate limiting — auth endpoints (login + register)
app.rate-limit.requests-per-minute=10

# Max simultaneous downloads (yt-dlp processes)
app.downloads.max-concurrent=3
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
logging.file.name=everload.log
logging.level.root=INFO
logging.level.com.EverLoad=INFO
# Logs API calls above this duration with a request id for diagnosis.
app.observability.slow-request-ms=${APP_OBSERVABILITY_SLOW_REQUEST_MS:1500}

# Trust X-Forwarded-* headers from the reverse proxy (Caddy/Nginx).
# Required so Spring Boot knows the request arrived via HTTPS,
# generates correct redirect URLs, and logs the real client IP.
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

# CORS allowed origins (comma-separated).
# Override via CORS_ALLOWED_ORIGINS environment variable.
# In production set to your actual domain: https://everload.yourdomain.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080,http://localhost,https://localhost,https://127.0.0.1,capacitor://localhost}

# H2 Database (persistent file)
spring.datasource.url=jdbc:h2:file:./everload-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# HTTP response compression (gzip for JSON/text API responses)
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=2048


# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA performance
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT — sin valor por defecto a propósito: la app NO arranca si falta JWT_SECRET
# (antes había un fallback publicado en el repo, es decir, una clave conocida).
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# NAS base storage path (mount Docker volume here)
nas.storage.base=/app/nas_storage

# Avatar storage
avatar.storage.path=./avatars
avatar.max-size-mb=5

# Audio tools — allow large file uploads (up to 500 MB)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Long-track streaming cache (HLS). Used by NAS Library for sessions/mixes.
music.hls.cache-dir=${MUSIC_HLS_CACHE_DIR:./hls-cache}
music.hls.min-duration-seconds=${MUSIC_HLS_MIN_DURATION_SECONDS:1200}
music.hls.min-size-bytes=${MUSIC_HLS_MIN_SIZE_BYTES:83886080}

# ── App version ────────────────────────────────────────────────────────────────
# Update this value on each release. Shown in Panel Admin > Sistema.
app.version=1.0.0

# ── Admin config.json path ─────────────────────────────────────────────────────
# Docker: override with APP_CONFIG_PATH=/app/data/config.json (on the DB volume)
app.config.path=${APP_CONFIG_PATH:./config.json}

# ── Maintenance flag file (persists state across restarts) ─────────────────────
# Docker: override with APP_MAINTENANCE_FLAG=/app/data/maintenance.flag (on the DB volume)
app.maintenance.flag-path=${APP_MAINTENANCE_FLAG:./maintenance.flag}

# ── Backup ─────────────────────────────────────────────────────────────────────
# Storage directory for DB backups.
# Docker: override with APP_BACKUP_PATH=/app/data/backups (persisted volume).
app.backup.path=${APP_BACKUP_PATH:./backups}
# Maximum number of backups to keep (oldest are removed automatically).
app.backup.retention=10
# Automatic scheduled backup — disabled by default.
app.backup.auto.enabled=false
# Cron expression for auto-backup. Default: 3 AM every day.
app.backup.auto.cron=0 0 3 * * ?

# ── Update ─────────────────────────────────────────────────────────────────────
# GitHub releases API URL for update checks (leave empty to disable).
# Example: https://api.github.com/repos/youruser/everload/releases/latest
# Tracks latest commit on main — works without creating GitHub releases.
app.update.check-url=https://api.github.com/repos/xianDT01/Everload/commits/main
# Optional path to a shell script that performs the update (leave empty to disable auto-run).
# The script is executed as-is; make sure it is trusted and not user-supplied.
# Example for Docker: /app/scripts/update.sh
app.update.script=

# Android release storage
# Docker: override with APP_ANDROID_RELEASE_PATH=/app/data/android-release (persisted volume).
app.android.release-path=${APP_ANDROID_RELEASE_PATH:./android-release}

# ── YouTube Music (anonymous browsing & playback) ──────────────────────────────
# Master switch — set to false to remove the module from the API entirely.
ytmusic.enabled=${YTMUSIC_ENABLED:true}

# Cache for read-only catalogue calls (search, discover shelves, albums,
# artists, public playlists). Same result for every visitor — safe to cache hard.
ytmusic.cache.ttl-seconds=${YTMUSIC_CACHE_TTL_SECONDS:600}
ytmusic.cache.max-entries=${YTMUSIC_CACHE_MAX_ENTRIES:200}

# How long a resolved stream URL is reused before re-running the resolver
# chain for the same video id. The browser issues several range requests per
# track (initial probe, seeks, re-buffers) — without this, each one would
# re-mint a Botguard token / re-shell yt-dlp from scratch, stalling playback.
# Comfortably below YouTube's own URL expiry window.
ytmusic.stream.cache-ttl-seconds=${YTMUSIC_STREAM_CACHE_TTL_SECONDS:1800}

# Stream resolver #1: Botguard (rustypipe-botguard binary mints a content-bound
# proof-of-origin token, paired with the ANDROID_VR client for plain stream URLs).
# Disable if the binary isn't installed — resolution still works via the
# InnerTube fallback chain and yt-dlp, just slower / lower hit-rate.
ytmusic.botguard.enabled=${YTMUSIC_BOTGUARD_ENABLED:true}
# Leave empty to auto-detect (next to the jar, common install dirs, PATH).
ytmusic.botguard.binary-path=${YTMUSIC_BOTGUARD_PATH:}
# CLI arguments used to mint a content-bound PO token; {videoId} is substituted.
# Adjust to match `rustypipe-botguard --help` for the installed version.
ytmusic.botguard.mint-args=${YTMUSIC_BOTGUARD_MINT_ARGS:generate-po-token --content-binding {videoId}}
ytmusic.botguard.timeout-seconds=${YTMUSIC_BOTGUARD_TIMEOUT_SECONDS:20}

# Stream resolver #3 (last resort): yt-dlp subprocess extraction.
ytmusic.ytdlp.enabled=${YTMUSIC_YTDLP_ENABLED:true}
ytmusic.ytdlp.binary-path=${YTMUSIC_YTDLP_PATH:yt-dlp}
ytmusic.ytdlp.timeout-seconds=${YTMUSIC_YTDLP_TIMEOUT_SECONDS:45}
