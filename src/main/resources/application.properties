spring.application.name=Everload
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
logging.file.name=everload.log
logging.level.root=INFO
logging.level.com.EverLoad=INFO

# H2 Database (persistent file)
spring.datasource.url=jdbc:h2:file:./everload-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET:EverloadSecretKey2024!SuperSeguro_CambiarEnProduccion_32chars+}
jwt.expiration=86400000

# NAS base storage path (mount Docker volume here)
nas.storage.base=/app/nas_storage

# Avatar storage
avatar.storage.path=./avatars
avatar.max-size-mb=5

# Audio tools — allow large file uploads (up to 500 MB)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
