services:

  # ── Caddy: reverse proxy + HTTPS ────────────────────────────────────────
  # Handles TLS automatically:
  #   CADDY_DOMAIN=localhost        → self-signed cert (Caddy local CA)
  #   CADDY_DOMAIN=yourdomain.com   → Let's Encrypt (ports 80+443 must be open)
  caddy:
    image: caddy:2-alpine
    container_name: everload-caddy
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP (redirected to HTTPS automatically by Caddy)
      - "443:443"     # HTTPS
      - "443:443/udp" # HTTP/3 QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Certificates and Let's Encrypt account keys — BACK UP THIS VOLUME
      - caddy-data:/data
      # Caddy runtime config cache
      - caddy-config:/config
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@example.com}
    depends_on:
      everload:
        condition: service_started
    networks:
      - everload-net

  # ── EverLoad: Spring Boot backend + Angular frontend ────────────────────
  # Caddy is the public route. The optional localhost port is useful for
  # Android emulator development, where 10.0.2.2 maps to the host machine.
  everload:
    build:
      context: .
      args:
        # Injected by deploy.sh / deploy.ps1 so the admin panel shows the deployed commit.
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: everload:latest
    container_name: everload
    expose:
      - "8080"
    ports:
      - "${EVERLOAD_BACKEND_BIND:-127.0.0.1:8080}:8080"
    environment:
      # --- Security: CHANGE JWT_SECRET IN PRODUCTION ---
      JWT_SECRET: ${JWT_SECRET:-EverloadSecretKey2024!SuperSeguro_CambiarEnProduccion_32chars+}

      # H2 database on persistent volume
      SPRING_DATASOURCE_URL: "jdbc:h2:file:/app/data/everload-db;DB_CLOSE_ON_EXIT=FALSE"

      # CORS allowed origins (comma-separated).
      # In production with a real domain, set to: https://yourdomain.com
      # Leave default for local dev with Angular dev server on :4200
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:8080,http://localhost,https://localhost,https://127.0.0.1,capacitor://localhost}

      # Trust X-Forwarded-* headers from Caddy
      SERVER_FORWARD_HEADERS_STRATEGY: framework

      # Backup directory — mapped to a host folder so copies survive container rebuilds
      APP_BACKUP_PATH: /app/backups

      # Maintenance flag — on the DB volume so it survives container restarts
      APP_MAINTENANCE_FLAG: /app/data/maintenance.flag

      # Admin config.json (Spotify/YouTube API keys) — on the DB volume so credentials persist
      APP_CONFIG_PATH: /app/data/config.json

    volumes:
      - everload-db:/app/data
      - everload-avatars:/app/avatars
      - C:/Users/Xian/Music/Everload/musica:/app/nas_storage
      # Backups stored directly on the host — survives docker-compose down/up and rebuilds
      - C:/Users/Xian/Music/Everload/backups:/app/backups
    restart: unless-stopped
    networks:
      - everload-net

# ── Internal network: Caddy ↔ EverLoad only ─────────────────────────────
networks:
  everload-net:
    driver: bridge

# ── Persistent volumes ────────────────────────────────────────────────────
volumes:
  everload-db:      # H2 database files
  everload-avatars: # User avatar images
  caddy-data:       # TLS certificates — back up in production
  caddy-config:     # Caddy runtime config cache
