<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Everload</title>
  <base href="/">

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- PWA meta -->
  <meta name="description" content="Tu plataforma de descarga y reproducción de media">
  <meta name="theme-color" content="#6c63ff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Everload">
  <meta name="msapplication-TileColor" content="#6c63ff">
  <meta name="msapplication-TileImage" content="icons/icon-144x144.png">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Icons — favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32"  href="icons/icon-96x96.png">
  <link rel="icon" type="image/png" sizes="96x96"  href="icons/icon-96x96.png">
  <link rel="icon" type="image/png" sizes="128x128" href="icons/icon-128x128.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">

  <!-- Icons — Apple -->
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512x512.png">

  <!-- Icons — Windows / Android shortcut -->
  <meta name="msapplication-TileImage" content="icons/icon-144x144.png">
</head>
<body>
  <!-- SW self-heal: detect corrupt cache and auto-clear before Angular boots (runs ONCE per session) -->
  <script>
    (function() {
      if (!navigator.serviceWorker) return;
      // Prevent infinite reload: only try self-heal once per session
      if (sessionStorage.getItem('sw_healed')) return;

      var lang = (localStorage.getItem('lang') || navigator.language || 'es').substring(0, 2);
      var url = '/assets/i18n/' + lang + '.json?_v=' + Date.now();
      fetch(url, { cache: 'no-store' })
        .then(function(r) { return r.text(); })
        .then(function(txt) {
          try {
            var obj = JSON.parse(txt);
            if (!obj || typeof obj !== 'object' || !Object.keys(obj).length) throw new Error('missing');
          } catch (e) {
            // Mark as attempted so we don't loop
            sessionStorage.setItem('sw_healed', '1');
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
            if (window.caches) {
              caches.keys().then(function(keys) {
                Promise.all(keys.map(function(k) { return caches.delete(k); })).then(function() {
                  location.reload();
                });
              });
            } else {
              setTimeout(function() { location.reload(); }, 500);
            }
          }
        })
        .catch(function() { /* offline or network error, skip */ });
    })();
  </script>
  <app-root></app-root>
</body>
</html>
