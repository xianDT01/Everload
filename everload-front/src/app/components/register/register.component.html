<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <h1 class="app-title">EverLoad</h1>
    </div>

    <h2 class="auth-subtitle">{{ 'REGISTER.TITLE' | translate }}</h2>

    <div class="success-msg" *ngIf="success">{{ success }}</div>

    <form (ngSubmit)="register()" class="auth-form" *ngIf="!success">
      <div class="form-group">
        <label for="username">{{ 'REGISTER.USERNAME_LABEL' | translate }}</label>
        <input id="username" type="text" [(ngModel)]="username" name="username"
               [placeholder]="'REGISTER.USERNAME_PLACEHOLDER' | translate" required />
      </div>

      <div class="form-group">
        <label for="email">{{ 'REGISTER.EMAIL_LABEL' | translate }}</label>
        <input id="email" type="email" [(ngModel)]="email" name="email"
               [placeholder]="'REGISTER.EMAIL_PLACEHOLDER' | translate" required />
      </div>

      <div class="form-group">
        <label for="password">{{ 'REGISTER.PASSWORD_LABEL' | translate }}</label>
        <input id="password" type="password" [(ngModel)]="password" name="password"
               [placeholder]="'REGISTER.PASSWORD_PLACEHOLDER' | translate" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">{{ 'REGISTER.CONFIRM_PASSWORD_LABEL' | translate }}</label>
        <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
               [placeholder]="'REGISTER.CONFIRM_PASSWORD_PLACEHOLDER' | translate" required />
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="loading">{{ 'REGISTER.LOADING' | translate }}</span>
        <span *ngIf="!loading">{{ 'REGISTER.SUBMIT' | translate }}</span>
      </button>
    </form>

    <p class="auth-link">
      {{ 'REGISTER.HAS_ACCOUNT' | translate }} <a routerLink="/login">{{ 'REGISTER.LOGIN_LINK' | translate }}</a>
    </p>
  </div>
</div>
