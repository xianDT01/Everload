<div class="msrch-page">
  <h1 class="msrch-title">{{ 'MUSIC.MODERN_SIDEBAR_SEARCH' | translate }}</h1>
  <div class="msrch-input-wrap">
    <span class="msrch-icon">🔍</span>
    <input class="msrch-input" type="text" [placeholder]="'MUSIC.MODERN_SEARCH_PLACEHOLDER' | translate"
           [(ngModel)]="query" (input)="onInput()" autofocus />
  </div>

  <div class="msrch-loading" *ngIf="loading">{{ 'MUSIC.MODERN_SEARCHING' | translate }}</div>

  <cdk-virtual-scroll-viewport class="msrch-results msrch-vscroll"
                               *ngIf="!loading && results.length"
                               [itemSize]="64"
                               [style.height.px]="vListHeight(results.length)">
    <div class="msrch-row" *cdkVirtualFor="let t of results; let i = index" (dblclick)="play(i)">
      <div class="msrch-cover">
        <img [src]="cover(t)" (error)="$any($event.target).style.display='none'" />
      </div>
      <div class="msrch-meta">
        <span class="msrch-name">{{ t.title || t.name }}</span>
        <span class="msrch-artist">{{ t.artist }}</span>
      </div>
      <span class="msrch-album">{{ t.album }}</span>
      <span class="msrch-dur">{{ fmt(t.duration) }}</span>
    </div>
  </cdk-virtual-scroll-viewport>

  <div class="msrch-empty" *ngIf="!loading && !results.length && query.trim()">
    {{ 'MUSIC.MODERN_NO_RESULTS_FOR' | translate: { query: query } }}
  </div>

  <div class="msrch-hint" *ngIf="!query.trim()">
    <span class="msrch-hint-icon">🎵</span>
    <p>{{ 'MUSIC.MODERN_SEARCH_HINT' | translate }}</p>
  </div>
</div>
