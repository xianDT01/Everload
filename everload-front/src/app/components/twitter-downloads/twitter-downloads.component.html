<div class="login-split-container">
  <div class="left-panel">
    <img src="/assets/twitter logo blck.png" alt="Twitter Logo" class="left-logo" />
  </div>

  <div class="right-panel">
    <div class="login-card">
      <h2 class="login-title">Twitter/X Downloader</h2>

      <input type="text" [(ngModel)]="tweetUrl" placeholder="{{ 'PASTE_TWEET_URL' | translate }}" class="login-input"
        aria-label="Tweet URL" />

      <button class="login-button" (click)="download()" [disabled]="loading" aria-label="Descargar tweet">
        <span *ngIf="!loading">{{ 'DOWNLOAD_TWITTER' | translate }}</span>
        <span *ngIf="loading">{{ 'LOADING' | translate }}...</span>
      </button>
      <button *ngIf="hasNasAccess && !nasJob" class="login-button btn-nas" (click)="openNasPicker()" [disabled]="loading">
        💾 {{ 'NAS.SAVE_TO_NAS' | translate }}
      </button>

      <div *ngIf="showNasPicker" class="nas-picker-inline">
        <select class="nas-picker-select" [(ngModel)]="selectedNasPathId">
          <option *ngFor="let p of nasPaths" [value]="p.id">{{ p.name }}</option>
        </select>
        <input class="nas-picker-input" type="text" placeholder="Subcarpeta (opcional)" [(ngModel)]="nasSubPath" />
        <div class="nas-picker-actions">
          <button class="login-button btn-nas" (click)="saveToNas()" [disabled]="!selectedNasPathId">Guardar</button>
          <button class="login-button" (click)="showNasPicker = false">Cancelar</button>
        </div>
      </div>

      <div *ngIf="nasJob" class="nas-job-status">
        <span class="nas-job-label">{{ nasJob.title || 'Descargando al NAS…' }}</span>
        <span class="nas-job-badge" [class.nas-done]="nasJob.status==='DONE'" [class.nas-error]="nasJob.status==='ERROR'">
          {{ nasJob.status === 'DONE' ? '✔ Guardado' : nasJob.status === 'ERROR' ? '✘ Error' : nasJob.status === 'RUNNING' ? 'Descargando…' : 'En cola' }}
        </span>
        <div class="nas-job-bar" *ngIf="nasJob.status !== 'ERROR'">
          <div class="nas-job-fill" [style.width.%]="nasJob.progress"></div>
        </div>
        <div class="nas-job-error" *ngIf="nasJob.status === 'ERROR'">{{ nasJob.error }}</div>
        <button class="nas-job-close" *ngIf="nasJob.status === 'DONE' || nasJob.status === 'ERROR'" (click)="nasJob = null">✕</button>
      </div>

      <a routerLink="/" class="forgot-link" aria-label="Volver al inicio">
        {{ 'HOME' | translate }}
      </a>

      <div class="language-selector" aria-label="Selector de idioma">
        <button (click)="changeLanguage('es')" aria-label="Cambiar a español">
          <img src="https://flagcdn.com/w40/es.png" alt="Español" class="flag" />
        </button>

        <button (click)="changeLanguage('en')" aria-label="Switch to English">
          <img src="https://flagcdn.com/w40/gb.png" alt="English" class="flag" />
        </button>

        <button (click)="changeLanguage('gl')" aria-label="Cambiar a galego">
          <img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Flag_of_Galicia.svg" alt="Galego"
            class="flag" />
        </button>
      </div>




      <div *ngIf="error" class="error-msg" role="alert">{{ error }}</div>
    </div>
  </div>
</div>
