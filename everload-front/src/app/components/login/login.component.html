<div class="auth-container">
  <!-- Background orbs -->
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>
  <div class="auth-orb auth-orb-3"></div>

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon-wrap">
        <img src="/assets/EverLoad.png" alt="EverLoad" class="logo-img"
             onerror="this.style.display='none'">
      </div>
      <h1 class="app-title">EverLoad</h1>
    </div>

    <!-- Heading -->
    <div class="auth-heading">
      <h2>{{ 'LOGIN.TITLE' | translate }}</h2>
      <p>{{ 'LOGIN.SUBTITLE' | translate }}</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="login()" class="auth-form" autocomplete="on" novalidate>

      <!-- Username -->
      <div class="form-group">
        <label for="username">{{ 'LOGIN.USERNAME_LABEL' | translate }}</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            [placeholder]="'LOGIN.USERNAME_PLACEHOLDER' | translate"
            required
            autocomplete="username"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">{{ 'LOGIN.PASSWORD_LABEL' | translate }}</label>
        <div class="input-wrapper has-toggle">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            [placeholder]="'LOGIN.PASSWORD_PLACEHOLDER' | translate"
            required
            autocomplete="current-password"
          />
          <button type="button" class="toggle-password"
                  [title]="(showPassword ? 'LOGIN.HIDE_PASSWORD' : 'LOGIN.SHOW_PASSWORD') | translate"
                  (click)="showPassword = !showPassword">
            <!-- Eye open -->
            <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye off -->
            <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div class="error-msg" *ngIf="error" role="alert">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             style="flex-shrink:0;margin-top:1px">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ error }}</span>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary"
              [disabled]="loading || !username || !password">
        <span class="btn-content" *ngIf="!loading">
          {{ 'LOGIN.SUBMIT' | translate }}
        </span>
        <span class="btn-loading" *ngIf="loading">
          <span class="spinner-sm"></span>
          {{ 'LOGIN.LOADING' | translate }}
        </span>
      </button>

    </form>

    <!-- Footer link -->
    <p class="auth-footer">
      {{ 'LOGIN.NO_ACCOUNT' | translate }}&nbsp;
      <a routerLink="/register">{{ 'LOGIN.REGISTER_LINK' | translate }}</a>
    </p>

  </div>
</div>
