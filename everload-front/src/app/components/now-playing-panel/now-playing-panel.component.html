<div class="np-panel" *ngIf="isOpen" (click)="$event.stopPropagation()">

  <!-- Blurred background art -->
  <div class="np-bg" [style.backgroundImage]="playerHasCover() ? 'url(' + playerCoverUrl() + ')' : 'none'"></div>
  <div class="np-bg-mask"></div>

  <!-- Close button -->
  <button class="np-close-btn" (click)="close()" title="Cerrar (ESC)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
    </svg>
  </button>

  <!-- Label -->
  <p class="np-label">Reproduciendo ahora</p>

  <!-- Album art -->
  <div class="np-art-wrap">
    <div class="np-art-glow" [class.np-art-pulse]="state?.playing"></div>
    <div class="np-art" [class.np-art-spin]="state?.playing">
      <img *ngIf="playerHasCover()" [src]="playerCoverUrl()"
           (error)="$any($event.target).style.display='none'" />
      <div *ngIf="!playerHasCover()" class="np-art-placeholder">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="rgba(255,255,255,0.15)">
          <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
        </svg>
      </div>
      <div class="np-vinyl-center" [class.spinning]="state?.playing"></div>
    </div>
  </div>

  <!-- Track info -->
  <div class="np-info-col">

    <div class="np-track-info">
      <p class="np-title">{{ state?.currentTrack?.title || state?.currentTrack?.name || '—' }}</p>
      <p class="np-artist">{{ state?.currentTrack?.artist || 'Artista desconocido' }}</p>
      <p class="np-album">{{ state?.currentTrack?.album || '' }}</p>
    </div>

    <!-- Like button -->
    <button *ngIf="state?.currentTrack" class="np-like-btn"
            [class.liked]="state?.currentTrack && isLiked(state!.currentTrack!)"
            (click)="state?.currentTrack && toggleLike($event, state!.currentTrack!)">
      <svg *ngIf="!(state?.currentTrack && isLiked(state!.currentTrack!))"
           width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <svg *ngIf="state?.currentTrack && isLiked(state!.currentTrack!)"
           width="22" height="22" viewBox="0 0 24 24" fill="#1db954">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </button>

    <!-- Progress bar -->
    <div class="np-progress-wrap">
      <span class="np-time">{{ fmt(state?.currentTime || 0) }}</span>
      <div class="np-progress-track" (click)="onSeek($event)">
        <div class="np-progress-fill"
             [style.width.%]="(state?.currentTime || 0) / (state?.duration || 1) * 100"></div>
        <div class="np-progress-thumb"
             [style.left.%]="(state?.currentTime || 0) / (state?.duration || 1) * 100"></div>
      </div>
      <span class="np-time">{{ fmt(state?.duration || 0) }}</span>
    </div>

    <!-- Playback controls -->
    <div class="np-controls">
      <button class="np-ctrl-btn np-ctrl-sm" (click)="musicService.toggleShuffle()"
              [class.active]="shuffle" title="Aleatorio">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
        </svg>
      </button>
      <button class="np-ctrl-btn"
              (click)="musicService.mainPlayer.seek(Math.max(0, (state?.currentTime||0) - 10))"
              title="−10s">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
      </button>
      <button class="np-ctrl-btn np-ctrl-play" (click)="musicService.mainPlayer.togglePlay()">
        <svg *ngIf="!state?.playing" width="34" height="34" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg *ngIf="state?.playing" width="34" height="34" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <button class="np-ctrl-btn"
              (click)="musicService.mainPlayer.seek(Math.min((state?.duration||0), (state?.currentTime||0) + 10))"
              title="+10s">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
        </svg>
      </button>
      <button class="np-ctrl-btn np-ctrl-sm" (click)="musicService.toggleRepeat()"
              [class.active]="repeat !== 'none'" title="Repetir">
        <svg *ngIf="repeat !== 'one'" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
        </svg>
        <svg *ngIf="repeat === 'one'" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/>
        </svg>
      </button>
    </div>

    <!-- Viz mode selector -->
    <div class="np-viz-mode-row">
      <button class="np-vizmode-btn" [class.active]="vizMode === 'bars'" (click)="vizMode = 'bars'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 18h2v-6H3v6zm4 0h2V6H7v12zm4 0h2v-9h-2v9zm4 0h2v-3h-2v3zm4-7h2v-2h-2v2z"/>
        </svg>
        Barras
      </button>
      <button class="np-vizmode-btn" [class.active]="vizMode === 'wave'" (click)="vizMode = 'wave'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22 9v2h-2V9h2zm-4-4v2h-2V5h2zm0 4v2h-2V9h2zm0 4v2h-2v-2h2zm-4-8v2h-2V5h2zm0 4v2h-2V9h2zm0 4v2h-2v-2h2zm0 4v2h-2v-2h2zm-4-4v2H8v-2h2zm0-4V9H8V9h2zm0-4V5H8V5h2zm0 12v2H8v-2h2zm-4-4v2H4v-2h2zm0-4V9H4V9h2z"/>
        </svg>
        Onda
      </button>
      <button class="np-vizmode-btn" [class.active]="vizMode === 'scope'" (click)="vizMode = 'scope'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
        </svg>
        Espectro
      </button>
    </div>

  </div><!-- /np-info-col -->

  <!-- Visualizer canvas -->
  <div class="np-viz-wrap">
    <canvas #panelCanvas class="np-canvas"></canvas>
  </div>

</div>
