<div class="player-bar" [class.visible]="!!state?.currentTrack">

  <!-- Left: Now playing -->
  <div class="pb-left">

    <!-- Album art -->
    <div class="pb-art" [class.has-cover]="playerHasCover()" [class.playing]="state?.playing"
         [class.clickable]="isNasTrack" (click)="goToLibrary()" [title]="isNasTrack ? 'Ir a NAS Library' : ''">
      <img *ngIf="playerHasCover()" [src]="playerCoverUrl()" />
      <div *ngIf="!playerHasCover()" class="pb-art-placeholder">♪</div>

      <!-- Waveform overlay when playing -->
      <div class="pb-waveform" *ngIf="state?.playing">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <!-- Source badge -->
      <span class="pb-source-badge" *ngIf="state?.currentTrack">{{ sourceLabel }}</span>
    </div>

    <!-- Track info -->
    <div class="pb-track-info">
      <span class="pb-title" [class.clickable]="isNasTrack" (click)="goToLibrary()">
        {{ state?.currentTrack?.title || state?.currentTrack?.name }}
      </span>
      <span class="pb-artist" *ngIf="!state?.error">
        {{ state?.currentTrack?.artist || ('MUSIC.UNKNOWN_ARTIST' | translate) }}
      </span>
      <span class="pb-error" *ngIf="state?.error" [title]="state?.error ?? ''">
        ⚠ {{ state?.error }}
      </span>
    </div>

    <button class="pb-like" *ngIf="state?.currentTrack" [title]="'MUSIC.LIKE' | translate" (click)="toggleLike($event)">
      <svg *ngIf="!isLiked" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <svg *ngIf="isLiked" width="16" height="16" viewBox="0 0 24 24" fill="#1db954" stroke="#1db954" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
  </div>

  <!-- Center: Controls + progress -->
  <div class="pb-center">
    <div class="pb-controls">
      <button class="pb-ctrl" [class.active]="shuffle" (click)="toggleShuffle()" [title]="'MUSIC.SHUFFLE' | translate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
        </svg>
        <span class="ctrl-dot" *ngIf="shuffle"></span>
      </button>

      <button class="pb-ctrl pb-skip" (click)="prev()" [title]="'MUSIC.PREV' | translate">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>

      <button class="pb-play" (click)="togglePlay()">
        <svg *ngIf="state?.playing" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
        <svg *ngIf="!state?.playing" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>

      <button class="pb-ctrl pb-skip" (click)="next()" [title]="'MUSIC.NEXT' | translate">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>

      <button class="pb-ctrl" [class.active]="repeat !== 'none'" (click)="toggleRepeat()" [title]="'MUSIC.REPEAT' | translate">
        <svg *ngIf="repeat !== 'one'" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
        </svg>
        <svg *ngIf="repeat === 'one'" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/>
        </svg>
        <span class="ctrl-dot" *ngIf="repeat !== 'none'"></span>
      </button>
    </div>

    <div class="pb-progress">
      <span class="pb-time">{{ fmt(state?.currentTime || 0) }}</span>
      <div class="pb-track" (click)="onSeekClick($event)">
        <div class="pb-fill" [style.width.%]="progressPct()"></div>
        <div class="pb-thumb" [style.left.%]="progressPct()"></div>
        <input type="range" class="pb-range"
               [max]="state?.duration || 0"
               [value]="state?.currentTime || 0"
               (input)="onSeek($event)" />
      </div>
      <span class="pb-time">{{ fmt(state?.duration || 0) }}</span>
    </div>
  </div>

  <!-- Right: Volume -->
  <div class="pb-right">
    <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path *ngIf="(state?.volume ?? 1) > 0.5" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      <path *ngIf="(state?.volume ?? 1) > 0 && (state?.volume ?? 1) <= 0.5" d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>
      <path *ngIf="(state?.volume ?? 1) === 0" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
    <div class="vol-track">
      <div class="vol-fill" [style.width.%]="(state?.volume ?? 1) * 100"></div>
      <input type="range" class="vol-range"
             min="0" max="1" step="0.02"
             [value]="state?.volume ?? 1"
             (input)="onVolume($event)" />
    </div>
  </div>

</div>
